<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Parkour Civilization Translator</title>
		<style>
			html,
			body {
				padding: 0;
				margin: 0;
			}
		</style>
	</head>
	<body>
		<p>Text</p>
		<textarea id="eng" style="width: 100%; min-height: 120px"></textarea>
		<p>Parkour Civilization Language</p>
		<textarea id="pcl" style="width: 100%; min-height: 120px"></textarea>

		<script>
			const eng = document.getElementById("eng");
			const pcl = document.getElementById("pcl");

			const txt2pcl = (txt) => {
				let out = "";
				for (let i = 0; i < txt.length; i++) {
					const c = txt[i].charCodeAt(0);
					const binned = c.toString(2).padStart(8, "0");
					for (let j = 0; j < binned.length; j++) {
						if (binned[j] == "0") {
							out += "_";
						} else {
							out += "[]";
						}
					}
				}
				return out;
			};

			const pcl2txt = (pcl) => {
				let out = "";
				let b = "";
				for (let i = 0; i < pcl.length; i++) {
					if (pcl[i] === "_") {
						b += "0";
					} else {
						b += "1";
						i++;
					}
					console.log(b);
					if (b.length == 8) {
						out += String.fromCharCode(parseInt(b, 2));
						b = "";
					}
				}
				return out;
			};

			window.addEventListener("DOMContentLoaded", () => {
				eng.addEventListener("input", () => {
					pcl.value = txt2pcl(eng.value);
				});
				pcl.addEventListener("input", () => {
					eng.value = pcl2txt(pcl.value);
				});
			});
		</script>
	</body>
</html>
